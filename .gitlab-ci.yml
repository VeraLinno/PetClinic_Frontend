stages:
  - verify
  - package
  - deploy

default:
  tags:
    - petclinic-runner

variables:
  GIT_STRATEGY: none

before_script:
  - set -e
  - echo "Git clone starting for branch $CI_COMMIT_REF_NAME"
  - export WORKDIR="$(mktemp -d -p /tmp petclinic-frontend-XXXXXX)"
  - "timeout 60 git clone --branch $CI_COMMIT_REF_NAME --depth 1 $CI_REPOSITORY_URL $WORKDIR"
  - cd "$WORKDIR"
  - echo "Clone successful, in directory $(pwd)"

frontend_verify:
  stage: verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - docker info
    - >
      docker run --rm
      -v "$WORKDIR":/src
      -w /src
      node:20-alpine
      sh -lc "npm ci && npm run build && npm run test"
    - >
      docker run --rm
      -v "$WORKDIR":/src
      -w /src
      mcr.microsoft.com/playwright:v1.58.2-jammy
      sh -lc "npm ci && npm run e2e"

frontend_container_smoke:
  stage: package
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  needs:
    - job: frontend_verify
  script:
    - docker info
    - docker build -t petclinic-frontend:$CI_COMMIT_SHORT_SHA "$WORKDIR"
    - export SMOKE_NET="petclinic-frontend-smoke-${CI_PIPELINE_ID}-${CI_JOB_ID}"
    - export SMOKE_FE="petclinic-frontend-smoke-${CI_PIPELINE_ID}-${CI_JOB_ID}"
    - export SMOKE_API_STUB="petclinic-api-stub-${CI_PIPELINE_ID}-${CI_JOB_ID}"
    - docker network create "$SMOKE_NET"
    - |
      # ensure network exists (sometimes docker reports 'not found' immediately)
      docker network create "$SMOKE_NET" >/dev/null 2>&1 || true
      docker network inspect "$SMOKE_NET" >/dev/null 2>&1 || (echo "Network $SMOKE_NET missing, recreating" && docker network create "$SMOKE_NET")
    - |
      cleanup() {
        docker rm -f "$SMOKE_FE" "$SMOKE_API_STUB" >/dev/null 2>&1 || true
        docker network rm "$SMOKE_NET" >/dev/null 2>&1 || true
      }
      trap cleanup EXIT
    - >
      docker run -d --name "$SMOKE_API_STUB" --network "$SMOKE_NET" --network-alias api
      python:3.12-alpine
      sh -lc "python -m http.server 5000"
    - |
      # Try running frontend container; recreate network and retry up to 3 times if it fails
      attempt=0
      until docker run -d --name "$SMOKE_FE" --network "$SMOKE_NET" petclinic-frontend:$CI_COMMIT_SHORT_SHA; do
        attempt=$((attempt+1))
        echo "docker run failed for $SMOKE_FE (attempt $attempt). Recreating network and retrying..."
        docker network create "$SMOKE_NET" >/dev/null 2>&1 || true
        sleep 1
        if [ "$attempt" -ge 3 ]; then
          echo "Failed to start $SMOKE_FE after $attempt attempts"
          exit 1
        fi
      done
    - |
      for i in $(seq 1 60); do
        if docker run --rm --network "$SMOKE_NET" curlimages/curl:8.8.0 -fsS "http://$SMOKE_FE/" >/dev/null 2>&1; then
          echo "Frontend container smoke check passed"
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: Frontend container smoke check failed"
      docker logs "$SMOKE_FE" --tail 200 || true
      exit 1

deploy_frontend:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: frontend_verify
    - job: frontend_container_smoke
  script:
    - docker info
    - docker network inspect petclinic_charp_default >/dev/null 2>&1 || docker network create petclinic_charp_default
    - docker build --build-arg VITE_API_BASE_URL= -t petclinic-frontend:latest "$WORKDIR"
    - docker rm -f petclinic-charp-frontend || true
    # Frontend deploy does NOT touch the `api` container.
    # The real API is deployed by velinn-petclinic_charp; killing it here (as the
    # previous stub-based smoke check did) leaves vera-linno-charp-clean serving 502.
    - docker run -d --name petclinic-charp-frontend --restart unless-stopped --network petclinic_charp_default -p 8081:80 petclinic-frontend:latest
    - docker ps --filter name=petclinic-charp-frontend
    - |
      wait_for_url() {
        local url="$1"
        local name="$2"
        local retries=30
        local delay=2

        for i in $(seq 1 $retries); do
          if command -v curl >/dev/null 2>&1; then
            if curl -fsS "$url" >/dev/null; then
              echo "$name is healthy: $url"
              return 0
            fi
          else
            if wget -qO- "$url" >/dev/null; then
              echo "$name is healthy: $url"
              return 0
            fi
          fi
          echo "Waiting for $name ($i/$retries): $url"
          sleep "$delay"
        done

        echo "ERROR: $name failed health check: $url"
        docker logs petclinic-charp-frontend --tail 200 || true
        return 1
      }

      wait_for_url "http://localhost:8081/" "frontend"

      # Best-effort check that the frontend can reach the real API. Non-fatal,
      # because the API is owned by velinn-petclinic_charp; if it is temporarily
      # down we still want the frontend deploy to succeed.
      if curl -fsS "http://localhost:8081/api/v1/health" >/dev/null; then
        echo "frontend->api proxy is healthy"
      else
        echo "WARN: frontend->api proxy is not reachable (api may be redeploying)"
      fi
