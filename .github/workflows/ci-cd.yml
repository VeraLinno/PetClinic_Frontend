name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

  container-smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t petclinic-frontend:${{ github.sha }} .

      - name: Run and verify frontend
        run: |
          set -e
          docker run -d --name petclinic-frontend-smoke -p 18081:80 petclinic-frontend:${{ github.sha }}
          for i in $(seq 1 45); do
            if docker run --rm --network container:petclinic-frontend-smoke curlimages/curl:8.8.0 -fsS http://localhost/ >/dev/null 2>&1; then
              echo "Frontend container is healthy"
              docker rm -f petclinic-frontend-smoke >/dev/null 2>&1 || true
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Frontend container health check failed"
          docker logs petclinic-frontend-smoke --tail 200 || true
          docker rm -f petclinic-frontend-smoke >/dev/null 2>&1 || true
          exit 1

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs:
      - verify
      - container-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          FRONTEND_DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}
        run: |
          set -e
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$FRONTEND_DEPLOY_PATH" ]; then
            echo "Missing one or more frontend deploy secrets"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.FRONTEND_DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker network inspect petclinic_default >/dev/null 2>&1 || docker network create petclinic_default
            docker build -t petclinic-frontend:latest .
            docker rm -f petclinic-frontend || true
            docker run -d --name petclinic-frontend --restart unless-stopped --network petclinic_default -p 80:80 petclinic-frontend:latest
            for i in $(seq 1 30); do
              if command -v curl >/dev/null 2>&1; then
                if curl -fsS http://localhost/ >/dev/null; then
                  echo "Frontend deploy smoke check passed"
                  exit 0
                fi
              else
                if wget -qO- http://localhost/ >/dev/null; then
                  echo "Frontend deploy smoke check passed"
                  exit 0
                fi
              fi
              sleep 2
            done
            echo "ERROR: Frontend deploy smoke check failed"
            docker logs petclinic-frontend --tail 200 || true
            exit 1
